<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>quitting the internet</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>quitting the internet</h1>
      <div class="stats">
        <div class="stat">
          <span class="stat-number" id="current-streak">—</span>
          <span class="stat-label">day streak</span>
        </div>
        <div class="stat">
          <span class="stat-number" id="longest-streak">—</span>
          <span class="stat-label">longest streak</span>
        </div>
        <div class="stat">
          <span class="stat-number" id="total-clean">—</span>
          <span class="stat-label">days no internet</span>
        </div>
        <div class="stat">
          <span class="stat-number" id="total-relapsed">—</span>
          <span class="stat-label">days relapsed</span>
        </div>
      </div>
      <div class="legend">
        <span class="legend-item"><span class="dot start"></span> start date</span>
        <span class="legend-item"><span class="dot clean"></span> no internet</span>
        <span class="legend-item"><span class="dot relapsed"></span> relapsed</span>
      </div>
    </header>
    <main id="calendar"></main>
  </div>
  <script src="app.js"></script>
</body>
</html>
